<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>app-ads.txt</title>
  <style>
    body {
      font-family: monospace;
      background: #111;
      color: #0f0;
      padding: 20px;
      white-space: pre;
    }
  </style>
</head>
<body>

<h2>app-ads.txt (for AdMob)</h2>

<pre id="content">Loading...</pre>

<script>
fetch("app-ads.txt")
  .then(res => res.text())
  .then(data => {
    document.getElementById("content").textContent = data;
  });
</script>

</body>
</html>
